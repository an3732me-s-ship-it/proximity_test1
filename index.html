<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
      // Your working material component
      AFRAME.registerComponent('architect-filters', {
        schema: {
          color: {type: 'color', default: '#ffffff'},
          opacity: {type: 'number', default: 1.0}
        },
        init: function () {
          this.el.addEventListener('model-loaded', () => {
            const mesh = this.el.getObject3D('mesh');
            if (!mesh) return;
            mesh.traverse((node) => {
              if (node.isMesh) {
                node.material.transparent = true;
                node.material.opacity = this.data.opacity;
                node.material.color.set(this.data.color);
                node.material.roughness = 0.7; 
                node.material.metalness = 0.2;
              }
            });
          });
        }
      });

      AFRAME.registerComponent('proximity-handler', {
  tick: function () {
    const m1 = document.querySelector('#marker1');
    const m2 = document.querySelector('#marker2');
    const stair = document.querySelector('#stair-model');

    // Check if both markers are FOUND by the camera
    if (m1 && m2 && m1.object3D.visible && m2.object3D.visible) {
      
      // Force the matrix to update so positions are fresh
      m1.object3D.updateMatrixWorld();
      m2.object3D.updateMatrixWorld();

      let p1 = new THREE.Vector3();
      let p2 = new THREE.Vector3();
      
      m1.object3D.getWorldPosition(p1);
      m2.object3D.getWorldPosition(p2);
      
      const distance = p1.distanceTo(p2);

      // DEBUG: If you can see your phone/laptop console, 
      // this tells us the EXACT number to use for the threshold.
      console.log("Current Distance:", distance);

      // We use a very large threshold (20) just to verify it WORKS first.
      // If it works now, you can lower this number later for precision.
      if (distance < 2) { 
        stair.setAttribute('visible', 'true');
        
        // Midpoint calculation
        const midX = (p1.x + p2.x) / 2;
        const midY = (p1.y + p2.y) / 2;
        const midZ = (p1.z + p2.z) / 2;
        
        // Position the stairs at the midpoint, but slightly ABOVE the markers (y + 2)
        // so they don't clip through the floor/paper.
        stair.object3D.position.set(midX, midY + 2, midZ);
        
        // Make the stairs face one of the markers
        stair.object3D.lookAt(p1);
      } else {
        stair.setAttribute('visible', 'false');
      }
    } else {
      // If the camera loses even one marker, hide the stairs
      stair.setAttribute('visible', 'false');
    }
  }
});
    </script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded 
             arjs="sourceType: webcam; debugUIEnabled: false; smooth: true; smoothCount: 10; patternRatio: 0.7;"
             proximity-handler>
      
      <a-entity light="type: ambient; intensity: 0.7; color: #ffffff;"></a-entity>
      <a-entity light="type: directional; intensity: 1.0;" position="1 4 2"></a-entity>

      <a-marker id="marker1" type="pattern" url="pattern-connect.patt">
        <a-box position="0 0.5 0" scale="1 1 1" material="color: #DB35CB; opacity: 0.2; wireframe: true;"></a-box>
      </a-marker>

      <a-marker id="marker2" type="pattern" url="pattern-connect2.patt">
        <a-box position="0 0.5 0" scale="1 1 1" material="color: #DB35CB; opacity: 0.2; wireframe: true;"></a-box>
      </a-marker>

      <a-entity id="stair-model" 
                gltf-model="url(stair.glb)" 
                scale="10 10 10" 
                rotation="0 0 0"
                visible="false"
                architect-filters="color: #DB35CB; opacity: 0.8">
      </a-entity>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
