<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
      // Your working material component
      AFRAME.registerComponent('architect-filters', {
        schema: {
          color: {type: 'color', default: '#ffffff'},
          opacity: {type: 'number', default: 1.0}
        },
        init: function () {
          this.el.addEventListener('model-loaded', () => {
            const mesh = this.el.getObject3D('mesh');
            if (!mesh) return;
            mesh.traverse((node) => {
              if (node.isMesh) {
                node.material.transparent = true;
                node.material.opacity = this.data.opacity;
                node.material.color.set(this.data.color);
                node.material.roughness = 0.7; 
                node.material.metalness = 0.2;
              }
            });
          });
        }
      });

      AFRAME.registerComponent('proximity-handler', {
  tick: function () {
    const m1 = document.querySelector('#marker1');
    const m2 = document.querySelector('#marker2');
    const box1 = m1.querySelector('a-box');
    const box2 = m2.querySelector('a-box');
    const stair = document.querySelector('#stair-model');

    if (m1 && m2 && m1.object3D.visible && m2.object3D.visible) {
      m1.object3D.updateMatrixWorld();
      m2.object3D.updateMatrixWorld();

      let p1 = new THREE.Vector3();
      let p2 = new THREE.Vector3();
      m1.object3D.getWorldPosition(p1);
      m2.object3D.getWorldPosition(p2);
      
      const distance = p1.distanceTo(p2);

      // Trigger at ~3cm
      if (distance < 2.5) { 
        stair.setAttribute('visible', 'true');
        box1.setAttribute('visible', 'false');
        box2.setAttribute('visible', 'false');
        
        // Midpoint positioning
        stair.object3D.position.set(
          (p1.x + p2.x) / 2,
          (p1.y + p2.y) / 2,
          (p1.z + p2.z) / 2
        );

        // 1. Point the object toward the other marker
        let direction = new THREE.Vector3().subVectors(p1, p2);
        direction.y = 0; 
        let upVector = new THREE.Vector3(0, 1, 0); 
        let matrix = new THREE.Matrix4().lookAt(direction, new THREE.Vector3(0,0,0), upVector);
        stair.object3D.quaternion.setFromRotationMatrix(matrix);

        // 2. THE X-AXIS FIX
        // This tilts the model 90 degrees to lay it flat or stand it up
        stair.object3D.rotateX(Math.PI / 2); 

        // 3. OPTIONAL Y-AXIS ADJUSTMENT
        // If it's flat but facing the "wrong" marker, uncomment the line below:
        // stair.object3D.rotateY(Math.PI / 2); 

      } else {
        stair.setAttribute('visible', 'false');
        box1.setAttribute('visible', 'true');
        box2.setAttribute('visible', 'true');
      }
    } else {
      stair.setAttribute('visible', 'false');
      if(box1) box1.setAttribute('visible', 'true');
      if(box2) box2.setAttribute('visible', 'true');
    }
  }
});
    </script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded 
             arjs="sourceType: webcam; debugUIEnabled: false; smooth: true; smoothCount: 10; patternRatio: 0.7;"
             proximity-handler>
      
      <a-entity light="type: ambient; intensity: 0.7; color: #ffffff;"></a-entity>
      <a-entity light="type: directional; intensity: 1.0;" position="1 4 2"></a-entity>

      <a-marker id="marker1" type="pattern" url="pattern-connect.patt">
        <a-box position="0 0.5 0" scale="1 1 1" material="color: #DB35CB; opacity: 0.2; wireframe: true;"></a-box>
      </a-marker>

      <a-marker id="marker2" type="pattern" url="pattern-connect2.patt">
        <a-box position="0 0.5 0" scale="1 1 1" material="color: #DB35CB; opacity: 0.2; wireframe: true;"></a-box>
      </a-marker>

      <a-entity id="stair-model" 
                gltf-model="url(stair.glb)" 
                scale="10 10 10" 
                rotation="0 0 0"
                visible="false"
                architect-filters="color: #DB35CB; opacity: 0.8">
      </a-entity>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
