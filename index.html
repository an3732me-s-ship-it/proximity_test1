<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <script>
      AFRAME.registerComponent('architect-filters', {
        schema: {
          color: {type: 'color', default: '#ffffff'},
          opacity: {type: 'number', default: 1.0}
        },
        init: function () {
          this.el.addEventListener('model-loaded', () => {
            const mesh = this.el.getObject3D('mesh');
            if (!mesh) return;
            mesh.traverse((node) => {
              if (node.isMesh) {
                node.material.transparent = true;
                node.material.opacity = this.data.opacity;
                node.material.color.set(this.data.color);
              }
            });
          });
        }
      });

      AFRAME.registerComponent('proximity-handler', {
        tick: function () {
          const m1 = document.querySelector('#marker1');
          const m2 = document.querySelector('#marker2');
          const box1 = m1.querySelector('a-box');
          const box2 = m2.querySelector('a-box');
          const stair = document.querySelector('#stair-model');

          if (m1 && m2 && m1.object3D.visible && m2.object3D.visible) {
            m1.object3D.updateMatrixWorld();
            m2.object3D.updateMatrixWorld();

            let p1 = new THREE.Vector3();
            let p2 = new THREE.Vector3();
            m1.object3D.getWorldPosition(p1);
            m2.object3D.getWorldPosition(p2);
            
            const distance = p1.distanceTo(p2);

            // 3cm Trigger (Distance 2.5)
            if (distance < 2.5) { 
              stair.setAttribute('visible', 'true');
              box1.setAttribute('visible', 'false');
              box2.setAttribute('visible', 'false');
              
              // Position at Midpoint
              stair.object3D.position.set(
                (p1.x + p2.x) / 2,
                (p1.y + p2.y) / 2,
                (p1.z + p2.z) / 2
              );

              // STABLE ROTATION MATH
              // We calculate the angle on the flat paper (X and Z)
              let angle = Math.atan2(p1.x - p2.x, p1.z - p2.z);

              // We FORCE the orientation. 
              // 1.57 (90 deg) on X makes it stand up.
              // 'angle' on Y makes it point at the other marker.
              // 0 on Z makes it impossible to "roll" onto its side.
              stair.object3D.rotation.set(1.57, angle, 0);

            } else {
              stair.setAttribute('visible', 'false');
              box1.setAttribute('visible', 'true');
              box2.setAttribute('visible', 'true');
            }
          } else {
            stair.setAttribute('visible', 'false');
          }
        }
      });
    </script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" proximity-handler>
      
      <a-marker id="marker1" type="pattern" url="pattern-connect.patt">
        <a-box scale="1 1 1" material="wireframe: true; color: #DB35CB"></a-box>
      </a-marker>

      <a-marker id="marker2" type="pattern" url="pattern-connect2.patt">
        <a-box scale="1 1 1" material="wireframe: true; color: #DB35CB"></a-box>
      </a-marker>

      <a-entity id="stair-model" 
                gltf-model="url(stair.glb)" 
                scale="10 10 10" 
                visible="false"
                architect-filters="color: #DB35CB; opacity: 0.8">
      </a-entity>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
